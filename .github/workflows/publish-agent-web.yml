name: Publish Agent Web Wiki

on:
  push:
    branches: [main]
    paths:
      - 'agent_internet/**'
      - 'docs/**'
      - 'scripts/build_agent_web_wiki.py'
      - 'scripts/publish_agent_web_wiki.py'
      - 'tests/test_repo_capsule.py'
      - 'tests/test_publisher.py'
      - '.github/workflows/publish-agent-web.yml'
  schedule:
    - cron: '29 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-agent-web
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout agent-internet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: python -m pip install -e .[dev]

      - name: Validate agent web publication slice
        run: |
          python -m py_compile \
            agent_internet/authority_feed_sync.py \
            agent_internet/cli.py \
            agent_internet/agent_web.py \
            agent_internet/agent_web_repo_graph.py \
            agent_internet/git_federation.py \
            agent_internet/publisher.py \
            agent_internet/publication_status.py \
            agent_internet/repo_capsule.py \
            scripts/build_agent_web_wiki.py \
            scripts/publish_agent_web_wiki.py \
            tests/test_cli.py \
            tests/test_git_federation.py \
            tests/test_projection_reconciler.py \
            tests/test_repo_capsule.py \
            tests/test_publisher.py
          python -m pytest -q tests/test_cli.py::test_cli_import_authority_bundle tests/test_cli.py::test_cli_configure_and_sync_manifest_authority_feed tests/test_projection_reconciler.py::test_projection_reconciler_imports_manifest_feed_and_publishes tests/test_git_federation.py tests/test_repo_capsule.py tests/test_publisher.py
          python scripts/build_agent_web_wiki.py --output-dir .agent_internet/wiki-build-ci

      - name: Configure upstream authority feeds
        run: |
          python -m agent_internet.cli configure-authority-feed \
            --state-path data/control_plane/state.json \
            --source-repo-id agent-world \
            --transport manifest_url \
            --locator "https://raw.githubusercontent.com/${{ github.repository_owner }}/agent-world/authority-feed/latest-authority-manifest.json"
          python -m agent_internet.cli configure-authority-feed \
            --state-path data/control_plane/state.json \
            --source-repo-id steward-protocol \
            --transport manifest_url \
            --locator "https://raw.githubusercontent.com/${{ github.repository_owner }}/steward-protocol/authority-feed/latest-authority-manifest.json"

      - name: Sync upstream authority feeds into control-plane state
        run: |
          python -m agent_internet.cli sync-authority-feed \
            --state-path data/control_plane/state.json \
            --feed-id agent-world-authority-bundle
          python -m agent_internet.cli sync-authority-feed \
            --state-path data/control_plane/state.json \
            --feed-id steward-authority-bundle

      - name: Configure git identity
        run: |
          git config --global user.name "agent-internet-bot"
          git config --global user.email "bot@agent-internet"

      - name: Preflight wiki remote
        env:
          WIKI_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          set +e
          python scripts/publish_agent_web_wiki.py \
            --wiki-url "$WIKI_URL" \
            --probe-only \
            --result-path .agent_internet/wiki-preflight.json
          STATUS=$?
          echo '## Agent Web Wiki Preflight' >> "$GITHUB_STEP_SUMMARY"
          cat .agent_internet/wiki-preflight.json >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS" -ne 0 ]; then
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo 'Enable the GitHub wiki for this repository before publish can succeed.' >> "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi

      - name: Publish agent web wiki
        env:
          WIKI_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          python scripts/publish_agent_web_wiki.py \
            --wiki-url "$WIKI_URL" \
            --prune-generated \
            --push \
            --result-path .agent_internet/wiki-publish-result.json

      - name: Summarize publication result
        run: |
          echo '## Agent Web Publish Result' >> "$GITHUB_STEP_SUMMARY"
          cat .agent_internet/wiki-publish-result.json >> "$GITHUB_STEP_SUMMARY"