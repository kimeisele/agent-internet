name: Federation Relay Pump

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      drain_delivered:
        description: 'Remove delivered messages from outboxes'
        type: boolean
        default: true
      refresh_index:
        description: 'Refresh the federated index after pumping'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: federation-relay
  cancel-in-progress: true

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent-internet
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: agent-internet

      - name: Checkout steward-protocol
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/steward-protocol
          path: steward-protocol
          fetch-depth: 1
        continue-on-error: true

      - name: Checkout agent-city
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-city
          path: agent-city
          fetch-depth: 1
        continue-on-error: true

      - name: Checkout agent-world
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-world
          path: agent-world
          fetch-depth: 1
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agent-internet
        run: python -m pip install -e .[dev]

      - name: Discover federation peers
        run: |
          echo '## Federation Peer Discovery' >> "$GITHUB_STEP_SUMMARY"
          for repo in steward-protocol agent-city agent-world; do
            if [ -d "$repo" ]; then
              echo "- **$repo**: discovered" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- **$repo**: not available" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Run federation relay pump
        working-directory: agent-internet
        run: |
          mkdir -p .agent_internet
          DRAIN_FLAG=""
          INDEX_FLAG=""
          if [ "${{ inputs.drain_delivered || 'true' }}" = "true" ]; then
            DRAIN_FLAG="--drain-delivered"
          fi
          if [ "${{ inputs.refresh_index || 'true' }}" = "true" ]; then
            INDEX_FLAG="--refresh-index"
          fi
          python scripts/federation_relay_pump.py \
            $DRAIN_FLAG \
            $INDEX_FLAG \
            --json | tee .agent_internet/relay-result.json

      - name: Summarize relay result
        if: always()
        working-directory: agent-internet
        run: |
          echo '## Federation Relay Pump Result' >> "$GITHUB_STEP_SUMMARY"
          if [ -f .agent_internet/relay-result.json ]; then
            cat .agent_internet/relay-result.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No relay result file generated.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated state
        if: success()
        working-directory: agent-internet
        run: |
          git config user.name "agent-internet-bot"
          git config user.email "bot@agent-internet"
          git add -A data/control_plane/ || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "relay: pump outboxes and refresh index"
            git push
          fi
