name: Federation Relay Pump

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      drain_delivered:
        description: 'Remove delivered messages from outboxes'
        type: boolean
        default: true
      refresh_index:
        description: 'Refresh the federated index after pumping'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: federation-relay
  cancel-in-progress: true

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent-internet
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: agent-internet

      - name: Checkout steward
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/steward
          path: steward
          fetch-depth: 1
          token: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Checkout steward-protocol
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/steward-protocol
          path: steward-protocol
          fetch-depth: 1
          token: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Checkout agent-city
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-city
          path: agent-city
          fetch-depth: 1
          token: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Checkout agent-world
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/agent-world
          path: agent-world
          fetch-depth: 1
          token: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agent-internet
        run: python -m pip install -e .[dev]

      - name: Discover federation peers
        run: |
          echo '## Federation Peer Discovery' >> "$GITHUB_STEP_SUMMARY"
          for repo in steward steward-protocol agent-city agent-world; do
            if [ -d "$repo" ]; then
              echo "- **$repo**: discovered" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- **$repo**: not available" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Run federation relay pump
        working-directory: agent-internet
        env:
          GITHUB_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .agent_internet
          DRAIN_FLAG=""
          INDEX_FLAG=""
          if [ "${{ inputs.drain_delivered || 'true' }}" = "true" ]; then
            DRAIN_FLAG="--drain-delivered"
          fi
          if [ "${{ inputs.refresh_index || 'true' }}" = "true" ]; then
            INDEX_FLAG="--refresh-index"
          fi
          python scripts/federation_relay_pump.py \
            $DRAIN_FLAG \
            $INDEX_FLAG \
            --json | tee .agent_internet/relay-result.json

      - name: Summarize relay result
        if: always()
        working-directory: agent-internet
        run: |
          echo '## Federation Relay Pump Result' >> "$GITHUB_STEP_SUMMARY"
          if [ -f .agent_internet/relay-result.json ]; then
            cat .agent_internet/relay-result.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No relay result file generated.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit agent-internet state
        if: success()
        working-directory: agent-internet
        run: |
          git config user.name "agent-internet-bot"
          git config user.email "bot@agent-internet"
          git add -A data/control_plane/ data/federation/ || true
          if git diff --cached --quiet; then
            echo "No agent-internet state changes."
          else
            git commit -m "relay: pump outboxes and refresh index"
            for attempt in 1 2 3; do
              git push && break
              echo "Push attempt $attempt failed, rebasing..."
              git pull --rebase origin main || true
              sleep $((RANDOM % 10 + 2))
            done
          fi

      - name: Push federation state to peer repos
        if: success()
        run: |
          for repo in steward steward-protocol agent-city agent-world; do
            if [ ! -d "$repo" ]; then
              echo "[$repo] not checked out, skipping."
              continue
            fi
            cd "$repo"
            git config user.name "agent-internet-bot"
            git config user.email "bot@agent-internet"
            git add -A data/federation/ || true
            if git diff --cached --quiet; then
              echo "[$repo] no federation state changes."
            else
              git commit -m "relay: federation sync from agent-internet pump"
              for attempt in 1 2 3; do
                git push && break
                echo "[$repo] push attempt $attempt failed, rebasing..."
                git pull --rebase origin main || true
                sleep $((RANDOM % 10 + 2))
              done && echo "[$repo] pushed." || echo "[$repo] push failed (non-fatal)."
            fi
            cd ..
          done

      - name: Write self heartbeat payload
        run: |
          mkdir -p data/federation
          echo '[{"agent_id":"agent-internet","operation":"heartbeat","source":"agent-internet","status":"alive","role":"projection_layer"}]' > data/federation/nadi_outbox.json

      - name: Relay self heartbeat to steward-federation hub
        if: always()
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/federation
          OUTBOX="data/federation/nadi_outbox.json"

          if [ ! -f "$OUTBOX" ]; then
            echo "[]" > "$OUTBOX"
          fi

          if [ "$(cat "$OUTBOX" | tr -d '[:space:]')" = "[]" ]; then
            echo "Self-heartbeat outbox empty, skipping relay"
            exit 0
          fi

          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/kimeisele/steward-federation.git /tmp/hub-self

          mkdir -p /tmp/hub-self/nadi

          cp "$OUTBOX" /tmp/hub-self/nadi/agent-internet_to_steward.json

          cd /tmp/hub-self
          git config user.name "agent-internet-bot"
          git config user.email "bot@agent-internet"
          git add nadi/agent-internet_to_steward.json
          git diff --cached --quiet || git commit -m "relay: agent-internet self-heartbeat → steward (relay #${{ github.run_number }})"
          for attempt in 1 2 3; do
            git push && break
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase origin main || true
            sleep $((RANDOM % 10 + 2))
          done

          echo "[]" > "$OUTBOX"
          echo "Self-heartbeat relayed and cleared"
